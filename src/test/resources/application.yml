spring:
  application:
    name: ontology-platform-test
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  sql:
    init:
      mode: always
      schema-locations: classpath:db/init-books.sql,classpath:db/init-university.sql,classpath:db/init-tenants.sql,classpath:db/init-audit.sql,classpath:db/init-api-keys.sql,classpath:db/init-jwt-blacklist.sql
      continue-on-error: true

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,info,metrics

ontology:
  auth:
    enabled: false
    api-keys:
      - admin-key-001
      - dev-key-002
    admin-password: ${ADMIN_PASSWORD:admin123}
    jwt:
      secret: ${JWT_SECRET:ontology-platform-test-jwt-secret-key-min-256-bits-long}
      expiration-ms: 86400000
      blacklist:
        cleanup-interval: 300000
  cache:
    sparql:
      max-size: 500
      ttl-seconds: 300
    query:
      max-size: 100
      ttl-seconds: 600
  rate-limit:
    capacity: 20
    refill-tokens: 10
    refill-period-seconds: 60
  owl-generation:
    output-dir: generated-ontologies
  viz:
    max-edge-limit: 1000
    cache-ttl-seconds: 300
  audit:
    retention-days: 90
  nlq:
    template-path: nlq-templates
    stream:
      timeout: 60000
    session:
      ttl: 1800000
      max: 1000
      cleanup-interval: 300000
    llm:
      api-key: ${LLM_API_KEY:sk-placeholder}
      model: gpt-4o-mini
      base-url:
  tenants:
    - id: sample
      name: Sample Books Database
      jdbc-url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
      jdbc-driver: org.h2.Driver
      jdbc-username: sa
      jdbc-password:
      owl-path: ontologies/exampleBooks.owl
      obda-path: ontologies/exampleBooks.obda

    - id: university
      name: University Reasoning Demo
      jdbc-url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
      jdbc-driver: org.h2.Driver
      jdbc-username: sa
      jdbc-password:
      owl-path: ontologies/university.owl
      obda-path: ontologies/university.obda

logging:
  level:
    org.zhengyan.ontology.platform: DEBUG
    it.unibz.inf.ontop: INFO
